version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: plagiarism-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: plagiarism-backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      USE_REDIS: "1"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2)\""]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "8000:8000"

  celery-worker:
    build:
      context: ./backend
    container_name: plagiarism-celery-worker
    command: ["celery", "-A", "app.celery:celery_app", "worker", "--loglevel=info"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      USE_REDIS: "1"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: plagiarism-frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"

  adminer:
    image: adminer:4
    container_name: plagiarism-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
