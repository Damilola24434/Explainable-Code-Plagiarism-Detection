<!--
This is the main HTML file for the frontend application. 
It serves as the entry point for the React app and 
includes references to the compiled JavaScript and CSS 
assets generated by Vite. The React application will mount
 onto the div with id "root".
-->
<!doctype html>
<html lang="en">
  <head>
    <!-- Basic page metadata -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <!-- React mounts the whole app inside this root element -->
    <div id="root"></div>
    <!-- Main frontend entry point (Vite + React + TypeScript) -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
